# Fichier local optionnel (créer backend/application-local.properties avec vos clés, non versionné)
spring.config.import=optional:file:./application-local.properties

# Variables requises si pas de application-local.properties : DATABASE_PASSWORD, MAIL_USERNAME, MAIL_PASSWORD, JWT_SECRET

# Configuration de la base de données PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/econsulat?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuration JPA/Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.connection.characterEncoding=utf-8
spring.jpa.properties.hibernate.connection.CharSet=utf-8
spring.jpa.properties.hibernate.connection.useUnicode=true

# Configuration des transactions
spring.transaction.default-timeout=30
spring.jpa.properties.hibernate.transaction.timeout=30
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Configuration Jackson pour Hibernate
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null

# Configuration des fichiers uploadés
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# Configuration email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.default-encoding=UTF-8

# Configuration JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# URL de l'application
app.url=http://localhost:5173

# Configuration du serveur
server.port=8080
server.address=0.0.0.0

# Configuration CORS pour le développement
spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

# Stripe : NE PAS mettre les vraies clés ici (voir application-local.properties ou variables d'environnement)
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
stripe.currency=eur
stripe.default-amount-cents=1000

# URLs de retour après paiement (frontend)
app.payment-success-url=${APP_PAYMENT_SUCCESS_URL:http://localhost:5173/payment/success}
app.payment-cancel-url=${APP_PAYMENT_CANCEL_URL:http://localhost:5173/payment/cancel}

# Actuator (health / info pour load balancer, monitoring)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
# Ne pas faire échouer le health global si le SMTP n'est pas configuré (ex. Docker sans mail)
management.health.mail.enabled=false

# Rate limiting (requêtes par minute par IP sur auth et webhook)
app.rate-limit.auth.requests-per-minute=10
app.rate-limit.webhook.requests-per-minute=30

# Logging
logging.level.com.econsulat=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.transaction=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.com.fasterxml.jackson=DEBUG
