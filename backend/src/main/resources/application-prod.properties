# Profil prod : sécurité et performance
# Activer avec : -Dspring.profiles.active=prod ou SPRING_PROFILES_ACTIVE=prod

# Pas de SQL dans les logs
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logs allégés (pas de DEBUG en prod)
logging.level.root=WARN
logging.level.com.econsulat=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# CORS : définir en prod via variable d'environnement CORS_ALLOWED_ORIGINS
# Exemple : CORS_ALLOWED_ORIGINS=https://app.econsulat.com,https://www.econsulat.com
# (les valeurs par défaut ci-dessous sont pour dev ; en prod, surcharger avec CORS_ALLOWED_ORIGINS)
# app.cors.allowed-origins est lu depuis application.properties ; en prod utiliser env.

# Pool de connexions (optionnel, HikariCP par défaut)
# spring.datasource.hikari.maximum-pool-size=20
# spring.datasource.hikari.connection-timeout=10000
# spring.datasource.hikari.idle-timeout=300000
