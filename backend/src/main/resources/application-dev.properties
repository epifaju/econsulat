# Profil dev : débogage et confort de développement
# Activer avec : -Dspring.profiles.active=dev ou SPRING_PROFILES_ACTIVE=dev

# SQL visible dans les logs (désactivé en prod)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logs détaillés pour le développement
logging.level.root=INFO
logging.level.com.econsulat=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.transaction=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.fasterxml.jackson=WARN

# CORS : origines dev par défaut (sinon voir app.cors.allowed-origins dans application.properties)
# app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
