# eConsulat - Backend + PostgreSQL
# Lancer : docker compose up -d
# Variables sensibles : définir dans .env (non versionné) ou en ligne de commande

services:
  db:
    image: postgres:15-alpine
    container_name: econsulat-db
    environment:
      POSTGRES_DB: econsulat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-changeme}
    ports:
      - "5433:5432"   # 5433 sur l'hôte pour éviter conflit avec PostgreSQL local
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Schéma et données initiales gérés par Flyway (backend) via db/migration
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d econsulat"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: econsulat-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/econsulat?useUnicode=true&characterEncoding=UTF-8
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # Profil Spring : dev (défaut) ou prod. En prod, mettre SPRING_PROFILES_ACTIVE=prod
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      # CORS : origines autorisées (séparées par des virgules). En prod, ex. https://app.econsulat.com
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      # Stockage S3/MinIO (optionnel). Si défini, utiliser APP_STORAGE_TYPE=s3 + S3_* pour MinIO
      APP_STORAGE_TYPE: ${APP_STORAGE_TYPE:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BUCKET: ${S3_BUCKET:-econsulat}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PATH_STYLE_ACCESS: ${S3_PATH_STYLE_ACCESS:-true}
    ports:
      - "8081:8080"   # 8081 sur l'hôte pour éviter conflit avec backend local (8080)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
